name: Generate posts

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate posts.json
        run: npm run generate-posts

      - name: Commit posts.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add posts.json

          git commit -m "Update posts.json" || exit 0
          git push