<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>highwatt</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

    <link rel="icon" href="assets/images/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a><img src="assets/images/burger.png" alt="Burger Menu" class = "burger"></a>
            <img src="assets/images/logo.png" alt="Logo" class="logo">
        </div>

        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="blog.html">Blog</a>
            <a href="now.html">Now</a>
        </div>
    </nav>

    <main class="hero">
        <h1 class="pixelify blur">highwatt</h1>
        <p class="about-line">Tinkering with a Ryzen 5600X and a 2060, mostly writing about whatever breaks on this site.</p>
    </main>

    <footer class="site-footer">
        <span>&copy; <span id="year"></span> highwatt</span>
        <a href="https://github.com/highwatttech" target="_blank" rel="noopener">GitHub</a>
        <span id="last-updated"></span>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();

        fetch("https://api.github.com/repos/highwatttech/highwatttech.github.io/commits/main")
            .then(res => res.json())
            .then(data => {
                if (!data.commit) return;
                const date = new Date(data.commit.committer.date);
                document.getElementById("last-updated").textContent =
                    "· last updated " + date.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
            })
            .catch(() => {});
    </script>

</body
